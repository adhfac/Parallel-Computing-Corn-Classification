<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hasil Prediksi</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500;600&display=swap');

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        padding: 2rem 1rem;
        background-color: #f5efe0;
        background-image:
          radial-gradient(
            circle at 10% 20%,
            rgba(180, 140, 80, 0.08) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 90% 80%,
            rgba(120, 90, 40, 0.08) 0%,
            transparent 50%
          );
        font-family: 'Inter', sans-serif;
        display: flex;
        justify-content: center;
      }

      .container {
        background: #fffdf5;
        border: 1.5px solid #d4b483;
        border-radius: 16px;
        padding: 2.5rem 2rem;
        max-width: 780px;
        width: 100%;
        box-shadow: 0 4px 24px rgba(120, 80, 20, 0.1);
        position: relative;
        overflow: hidden;
        align-self: flex-start;
        margin-top: 1rem;
      }

      .container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: linear-gradient(90deg, #8b5e1a, #c49a3c, #8b5e1a);
        border-radius: 16px 16px 0 0;
      }

      .page-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 1.5rem;
      }

      .header-icon {
        width: 44px;
        height: 44px;
        background: #faefd4;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        flex-shrink: 0;
      }

      h1 {
        font-family: 'Merriweather', serif;
        font-size: 1.3rem;
        font-weight: 700;
        color: #5a3a0a;
      }

      .meta-bar {
        display: flex;
        gap: 12px;
        margin-bottom: 1.75rem;
        flex-wrap: wrap;
      }

      .meta-chip {
        display: flex;
        align-items: center;
        gap: 6px;
        background: #faefd4;
        border: 1px solid #d4b483;
        border-radius: 999px;
        padding: 0.35rem 0.85rem;
        font-size: 0.82rem;
        color: #6b4a14;
        font-weight: 500;
      }

      .meta-chip .val {
        font-weight: 600;
        color: #5a3a0a;
      }

      .meta-chip svg {
        flex-shrink: 0;
      }

      .divider {
        border: none;
        border-top: 1px dashed #d4b483;
        margin: 0 0 1.5rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }

      thead tr {
        background: #8b5e1a;
      }

      thead th {
        color: #fff8e8;
        padding: 0.75rem 1rem;
        text-align: left;
        font-weight: 600;
        font-size: 0.82rem;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      thead th:first-child {
        border-radius: 8px 0 0 0;
      }
      thead th:last-child {
        border-radius: 0 8px 0 0;
      }

      tbody tr {
        border-bottom: 1px solid #e8d9b8;
        transition: background 0.15s;
      }

      tbody tr:last-child {
        border-bottom: none;
      }
      tbody tr:hover {
        background: #fdf6e3;
      }

      tbody td {
        padding: 0.9rem 1rem;
        color: #4a2e08;
        vertical-align: middle;
      }

      tbody td img {
        width: 200px;
        height: 140px;
        object-fit: cover;
        border-radius: 8px;
        border: 1.5px solid #d4b483;
        display: block;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 1.75rem;
        padding: 0.6rem 1.2rem;
        background: transparent;
        border: 1.5px solid #c49a3c;
        border-radius: 8px;
        color: #6b4a14;
        font-size: 0.88rem;
        font-weight: 600;
        font-family: 'Inter', sans-serif;
        text-decoration: none;
        transition: background 0.15s;
      }

      .back-link:hover {
        background: #faefd4;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="page-header">
        <div class="header-icon">🌽</div>
        <h1>Hasil Klasifikasi Penyakit Daun Jagung</h1>
      </div>

      <div class="meta-bar">
        <div class="meta-chip">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
          </svg>
          Metode: <span class="val">{{ method }}</span>
        </div>
        <div class="meta-chip">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M12 6v6l4 2" />
          </svg>
          Waktu Eksekusi: <span class="val">{{ execution_time }} detik</span>
        </div>
      </div>

      <hr class="divider" />

      <table>
        <thead>
          <tr>
            <th>Gambar</th>
            <th>Hasil Prediksi</th>
          </tr>
        </thead>
        <tbody>
          {% for result in predictions %}
          <tr>
            <td>
              <img src="{{ result.image }}" alt="Gambar daun jagung" />
            </td>
            <td>{{ result.label }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>

      <a href="/" class="back-link">
        <svg
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
        >
          <path d="M19 12H5M12 5l-7 7 7 7" />
        </svg>
        Kembali
      </a>
    </div>
  </body>
</html>
